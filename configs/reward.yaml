stage_name: reward
seed: 42
model:
  base_model_name: Qwen/Qwen3-0.6B
  trust_remote_code: true
  use_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  compute_dtype: bfloat16
data:
  dataset_name: trl-lib/ultrafeedback_binarized
  dataset_config_name:
  train_split: train
  eval_split: train[:512]
  input_file: data/processed/reward_train.jsonl
  eval_file: data/processed/reward_eval.jsonl
  use_processed_if_available: true
  cache_dir: data/cache
  num_proc: 4
  max_train_samples: 30000
  max_eval_samples: 512
  max_length: 2048
  prompt_template: "下面是一道数学题与一个学生答案，请从清晰度、步骤完整性、教学风格和结论明确性角度给出偏好。"
training:
  output_dir: outputs/reward
  logging_dir: outputs/reward/tensorboard
  model_dir: outputs/reward/model
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  weight_decay: 0.01
  num_train_epochs: 1
  max_steps: -1
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  bf16: true
  fp16: false
  gradient_checkpointing: true
  resume_from_checkpoint:
  report_to:
    - tensorboard
lora:
  enabled: true
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
llamafactory:
  cli_path: llamafactory-cli
  dataset_dir: data/llamafactory
  template: qwen
  train_args: {}
  export_args: {}
