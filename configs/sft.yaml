stage_name: sft
seed: 42
model:
  base_model_name: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: true
  use_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  compute_dtype: bfloat16
  attn_implementation: sdpa
data:
  dataset_name: open-r1/OpenR1-Math-220k
  dataset_config_name: default
  train_split: train
  eval_split: train[:512]
  input_file: data/processed/sft_train.jsonl
  eval_file: data/processed/sft_eval.jsonl
  use_processed_if_available: true
  cache_dir: data/cache
  num_proc: 4
  max_train_samples: 20000
  max_eval_samples: 512
  val_ratio: 0.02
  system_prompt: "你是一名耐心、严谨、擅长分步讲解的数学老师。请按“题意理解、思路、步骤、答案、总结”结构作答，并确保最终答案明确。"
training:
  output_dir: outputs/sft
  logging_dir: outputs/sft/tensorboard
  adapter_dir: outputs/sft/adapter
  merged_dir: outputs/sft/merged
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  num_train_epochs: 1
  max_steps: -1
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  max_seq_length: 2048
  bf16: true
  fp16: false
  gradient_checkpointing: true
  packing: false
  resume_from_checkpoint:
  report_to:
    - tensorboard
  auto_merge_after_training: false
lora:
  enabled: true
  r: 64
  alpha: 128
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
llamafactory:
  cli_path: llamafactory-cli
  dataset_dir: data/llamafactory
  template: qwen
  train_args: {}
  export_args:
    export_size: 2
